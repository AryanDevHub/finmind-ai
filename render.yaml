services:
  # ── Backend — FastAPI ─────────────────────────────────────────
  - type: web
    name: finmind-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python setup_db.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: finmind-db
          property: connectionString

  # ── Frontend — Streamlit ──────────────────────────────────────
  - type: web
    name: finmind-ai-frontend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.port 10000 --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: API_URL
        value: https://finmind-ai-backend.onrender.com

databases:
  - name: finmind-db
    plan: free